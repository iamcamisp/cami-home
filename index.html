<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cami & Joe's Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <p class="kicker">A home in progress</p>
    <h1>Cami & Joe's Home</h1>
    <p class="sub">Inventory and planning, room by room.</p>
  </header>

  <nav id="room-nav" class="room-nav" aria-label="Rooms">
    <div class="room-nav-inner"></div>
  </nav>

  <div class="filters">
    <label for="status-filter">Status</label>
    <select id="status-filter">
      <option value="all" selected>All</option>
      <option value="planned">Planned</option>
      <option value="owned">Owned</option>
      <option value="to-sell">To sell</option>
      <option value="sold">Sold</option>
    </select>
    <label for="category-filter">Category</label>
    <select id="category-filter">
      <option value="all" selected>All</option>
    </select>
  </div>

  <main id="rooms" aria-busy="true">
    <p class="loading">Loading…</p>
  </main>

  <footer></footer>

  <script src="script.js"></script>
</body>
</html>
