<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cami's Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <p class="kicker">A home, in progress</p>
    <h1>Cami's Home.</h1>
    <p class="sub">Pieces I'm planning, room by room.</p>
  </header>

  <nav id="room-nav" class="room-nav" aria-label="Rooms">
    <div class="room-nav-inner"></div>
  </nav>

  <div class="filters" role="tablist" aria-label="Status filter">
    <button type="button" data-status="all" class="active">All</button>
    <button type="button" data-status="planned">Planned</button>
    <button type="button" data-status="owned">Owned</button>
    <button type="button" data-status="to-sell">To sell</button>
    <button type="button" data-status="sold">Sold</button>
  </div>

  <main id="rooms" aria-busy="true">
    <p class="loading">Loading…</p>
  </main>

  <footer></footer>

  <script src="script.js"></script>
</body>
</html>
